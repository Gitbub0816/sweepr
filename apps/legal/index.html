      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="theme-color" content="#14b8a6" />
    <link rel="icon" type="image/png" href="/brand/sweepr-logo.png" />
    <title>Sweepr — Legal Documents</title>
    <meta
      name="description"
      content="Sweepr legal documents: Terms of Service, Privacy Policy, SMS Policy, Independent Contractor Agreement, and more."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Ubuntu Mono is the required typeface for all Sweepr legal documents. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"

    />
