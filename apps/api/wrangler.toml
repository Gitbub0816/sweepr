name = "sweepr-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "placeholder_replace_with_real_kv_id"
preview_id = "placeholder_replace_with_real_preview_id"

# Secrets — set with: wrangler secret put SECRET_NAME
# CLERK_SECRET_KEY
# DATABASE_URL
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# MAILERSEND_API_KEY
# CHECKR_API_KEY        (omit for mock mode while account is under review)
# CHECKR_PACKAGE        e.g. tasker_standard
# CHECKR_WEBHOOK_SECRET Checkr dashboard → Webhooks → signing secret
# DIDIT_API_KEY
# MAPBOX_SECRET_TOKEN
# FIREBASE_PROJECT_ID
# FIREBASE_CLIENT_EMAIL
# FIREBASE_PRIVATE_KEY
# FIREBASE_STORAGE_BUCKET
# ALLOWED_ORIGINS

[env.production]
vars = { ENVIRONMENT = "production" }
