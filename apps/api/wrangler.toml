name = "sweepr-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[vars]
ENVIRONMENT = "production"

# 5th "site": the API + webhooks live on their own subdomain (api.getsweepr.com),
# NOT under a path on another site. This binds the Worker to the custom domain
# on deploy, exposing:
#   https://api.getsweepr.com/webhooks/stripe
#   https://api.getsweepr.com/webhooks/didit
#   https://api.getsweepr.com/webhooks/checkr/webhook
# Requires the getsweepr.com zone to be in this Cloudflare account.
routes = [
  { pattern = "api.getsweepr.com", custom_domain = true }
]

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "ec932b508b6b43dd85d9cdeabaa850c3"
preview_id = "ec932b508b6b43dd85d9cdeabaa850c3"

# Secrets stored in Cloudflare (set via wrangler secret put or dashboard):
# CLERK_SECRET_KEY
# DATABASE_URL
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# MAILERSEND_API_KEY
# POSTHOG_KEY
# ACCESS_CODE_ENCRYPTION_KEY  (32-byte hex key: openssl rand -hex 32)
# DIDIT_API_KEY               (x-api-key for hosted session creation)
# DIDIT_WORKFLOW_ID           (personal / individual KYC workflow)
# DIDIT_WORKFLOW_ID_BUSINESS  (business / authorized-rep workflow)
# DIDIT_WEBHOOK_SECRET        (HMAC-SHA256 webhook signature secret)
# DIDIT_CLIENT_ID             (optional — not needed for hosted session flow)
# DIDIT_CLIENT_SECRET         (optional — not needed for hosted session flow)
# DIDIT_ORGANIZATION_ID       (optional)
# R2_ACCOUNT_ID             (Cloudflare account ID)
# R2_ACCESS_KEY_ID          (R2 token access key ID)
# R2_SECRET_ACCESS_KEY      (R2 token secret access key)
# R2_BUCKET                 (value: sweepr)
# R2_PUBLIC_URL             (value: https://objects.getsweepr.com)
# R2_LEGAL_ACCESS_KEY_ID    (R2 API token for sweepr-legal bucket — PUT only)
# R2_LEGAL_SECRET_ACCESS_KEY
# CHECKR_API_KEY            (omit for mock mode — account under review)
# CHECKR_PACKAGE
# CHECKR_WEBHOOK_SECRET
# ALLOWED_ORIGINS
# CF_STREAM_ACCOUNT_ID      (Cloudflare account ID — same value as R2_ACCOUNT_ID)
# CF_STREAM_API_TOKEN       (API token with Cloudflare Stream:Edit permission)
# CLERK_WEBHOOK_SECRET      (from Clerk Dashboard → Webhooks → signing secret, starts with whsec_)

[env.production]
vars = { ENVIRONMENT = "production" }


[triggers]
crons = ["*/15 * * * *"]
